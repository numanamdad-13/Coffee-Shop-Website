<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee Shop Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2>Welcome to Coffee Time</h2>
        <form action="login_process.php" method="POST">
            <label for="username">Username or Email</label><b></b>
            <input type="text" id="username" name="username" required></form><br>

            <label for="password">Password</label><b></b>
            <input type="password" id="password" name="password" required><br>

            <button type="submit">Login</button><b></b>
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p><b></b>
        </form>
    </div>
</body>
</html>
